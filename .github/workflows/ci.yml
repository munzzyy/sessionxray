name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only, no install needed)
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke-test the CLI end to end
        run: |
          python -m sessionxray tests/fixtures/benign/benign-session.jsonl --fail-on high
          python -m sessionxray tests/fixtures/malicious/secrets.jsonl --json --fail-on none
          python -m sessionxray --summary tests/fixtures/malicious tests/fixtures/benign --fail-on none

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install noslop-lint
        run: pip install noslop-lint==0.10.0
      - name: Lint source for AI writing tells
        run: git ls-files -z -- '*.py' | xargs -0r noslop --no-config
      - name: Lint docs for AI writing tells
        run: noslop --no-config --prose README.md CONTRIBUTING.md
